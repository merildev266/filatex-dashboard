# ── Google Cloud Build — Filatex PMO Dashboard ──────────────────────────────
# Triggered manually or via Cloud Build trigger on push to main.
#
# Substitution variables (set in trigger or --substitutions flag):
#   _REGION       e.g. europe-west1
#   _SERVICE      e.g. filatex-dashboard
#   _IMAGE        Full image path, e.g. europe-west1-docker.pkg.dev/$PROJECT_ID/filatex/dashboard
#
# Required IAM on the Cloud Build service account:
#   - roles/run.admin
#   - roles/iam.serviceAccountUser (to act as the Cloud Run service account)
#   - roles/artifactregistry.writer
# ---------------------------------------------------------------------------

substitutions:
  _REGION: europe-west1
  _SERVICE: filatex-dashboard
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/filatex/dashboard

steps:
  # 1 — Build the Docker image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=${_IMAGE}:${SHORT_SHA}
      - --tag=${_IMAGE}:latest
      - --cache-from=${_IMAGE}:latest
      - .

  # 2 — Push both tags to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_IMAGE}

  # 3 — Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed

      # ── Access ──────────────────────────────────────────────────────────
      # Uncomment ONE of the two lines below:
      - --allow-unauthenticated          # Public dashboard (password handled by app)
      # - --no-allow-unauthenticated     # Require Google IAM (use with Identity-Aware Proxy)

      # ── Resources ───────────────────────────────────────────────────────
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --concurrency=80

      # ── Non-secret environment variables ────────────────────────────────
      - --set-env-vars=LOG_LEVEL=INFO,DATA_BASE_PATH=Fichiers de DOSSIER DASHBOARD - Data_Dashbords,TTL_HFO_SITES=3600,TTL_ENR_SITES=3600,TTL_HFO_PROJECTS=1800,TTL_ENR_PROJECTS=900,TTL_CAPEX=3600,TTL_REPORTING=900,TTL_INVESTMENTS=900,TTL_DEFAULT=900,REFRESH_AHEAD_SECONDS=120,REFRESH_WORKER_INTERVAL=60,GUNICORN_WORKERS=2,GUNICORN_THREADS=4,GUNICORN_TIMEOUT=120

      # ── Secrets from Secret Manager ─────────────────────────────────────
      # Format: ENV_VAR=secret-name:version (use "latest" for auto-rotation)
      - --set-secrets=AZURE_TENANT_ID=filatex-azure-tenant-id:latest,AZURE_CLIENT_ID=filatex-azure-client-id:latest,AZURE_CLIENT_SECRET=filatex-azure-client-secret:latest,ONEDRIVE_DRIVE_ID=filatex-onedrive-drive-id:latest

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
