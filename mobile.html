<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#080b18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Filatex Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/accueil.css"/>
<link rel="stylesheet" href="css/mobile.css"/>
<style>
  #m-cards-container{display:grid !important;grid-template-columns:repeat(2,1fr) !important;gap:12px !important;}
  #m-cards-container .card{width:100% !important;height:auto !important;min-height:0 !important;aspect-ratio:1/1 !important;padding:16px 12px !important;pointer-events:auto !important;}
  #m-cards-container .card *{pointer-events:auto !important;}
</style>
</head>
<body>

<!-- ══ ACCUEIL ══ -->
<div id="m-home">

  <div class="m-header">
    <div class="m-logo">Groupe Filatex</div>
    <div class="m-sub">PMO Dashboard</div>
  </div>

  <div class="m-cards" id="m-cards-container"></div>

  <div class="m-footer">Filatex PMO · 2026</div>

</div>

<script>
// Copie les cartes depuis index.html via fetch
fetch('index.html').then(function(r){return r.text();}).then(function(html){
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, 'text/html');
  var cards = doc.querySelectorAll('.cards-row1 .card');
  var container = document.getElementById('m-cards-container');
  cards.forEach(function(card){
    var clone = card.cloneNode(true);
    // Remplace onclick desktop par mobile
    clone.removeAttribute('onclick');
    var pole = clone.id.replace('btn-','');
    clone.addEventListener('click', function(){ goTo(pole); });
    clone.classList.add('m-card');
    container.appendChild(clone);
  });
});
</script>

<!-- ══ BOTTOM NAV ══ -->
<div id="m-nav">
  <button class="m-nav-item active" data-pole="home" onclick="goHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
    <span>Accueil</span>
  </button>
  <button class="m-nav-item" data-pole="energy" onclick="goTo('energy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    <span>Energy</span>
  </button>
  <button class="m-nav-item" data-pole="properties" onclick="goTo('properties')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span>Properties</span>
  </button>
  <button class="m-nav-item" data-pole="reporting" onclick="goTo('reporting')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Reporting</span>
  </button>
</div>

<script>
// Navigation — pour l'instant redirige vers index.html avec hash
function goTo(pole){
  window.location.href = 'index.html#page-' + pole;
}
function goHome(){
  // Déjà sur l'accueil mobile
}
</script>

</body>
</html>
